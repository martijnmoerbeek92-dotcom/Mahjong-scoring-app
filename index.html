<html lang="en">

<title>Mahjong Scorekeeper</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --jade-deep: #0d3b2e;
    --jade: #12503d;
    --jade-light: #1c6b52;
    --ivory: #f2ead7;
    --ivory-dim: #e4d9bd;
    --ink: #211c14;
    --gold: #c79a2e;
    --gold-bright: #e0b23f;
    --red: #a33b32;
    --red-bright: #c24d40;
    --font-display: 'Zilla Slab', serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:var(--font-body);
    background: radial-gradient(circle at 50% 0%, var(--jade-light) 0%, var(--jade) 45%, var(--jade-deep) 100%);
    color:var(--ivory);
    min-height:100vh;
    padding:32px 16px 64px;
    overscroll-behavior-y: none;
  }
  .wrap{max-width:920px;margin:0 auto;}
  h1{font-family:var(--font-display); font-weight:700; font-size:clamp(28px,5vw,42px); text-align:center; letter-spacing:0.5px; margin:0 0 4px; color:var(--ivory);}
  .subtitle{text-align:center; color:var(--ivory-dim); font-size:14px; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:36px;}
  
  .card{
    background:linear-gradient(180deg, rgba(242,234,215,0.06), rgba(242,234,215,0.02));
    border:1px solid rgba(242,234,215,0.14);
    border-radius:14px;
    padding:24px;
    backdrop-filter:blur(2px);
    margin-bottom: 20px;
  }

  /* Setup */
  #setup .field{margin-bottom:16px;}
  #setup label{display:block; font-size:12px; text-transform:uppercase; letter-spacing:1px; color:var(--gold-bright); margin-bottom:6px; font-weight:600;}
  input[type=text], input[type=number]{
    width:100%; padding:12px; border-radius:8px; border:1px solid rgba(242,234,215,0.25);
    background:rgba(0,0,0,0.18); color:var(--ivory); font-family:var(--font-body); font-size:16px;
  }

  .btn{
    appearance:none; border:none; cursor:pointer; font-family:var(--font-body); font-weight:600; font-size:14px;
    padding:11px 20px; border-radius:8px; background:var(--gold); color:var(--ink); transition:all .12s ease;
  }
  .btn:hover{background:var(--gold-bright); transform:translateY(-1px);}
  .btn.secondary{background:transparent; color:var(--ivory); border:1px solid rgba(242,234,215,0.35);}
  .btn:disabled{opacity:0.3; cursor:not-allowed;}

  /* Compass */
  .compass{
    display:grid; grid-template-columns:1fr 1fr 1fr; grid-template-rows:auto auto auto;
    gap:14px; align-items:center; justify-items:center; margin-bottom:28px;
  }
  .seat-slot.north{grid-column:2; grid-row:1;}
  .seat-slot.west{grid-column:1; grid-row:2;}
  .seat-slot.center{grid-column:2; grid-row:2;}
  .seat-slot.east{grid-column:3; grid-row:2;}
  .seat-slot.south{grid-column:2; grid-row:3;}

  .seat-card{
    background:var(--ivory); color:var(--ink); border-radius:10px; padding:12px;
    text-align:center; box-shadow:0 4px 10px rgba(0,0,0,0.2); position:relative; width: 100%;
  }
  .seat-card.is-dealer{ border: 3px solid var(--red); }
  .seat-wind-tag{
    font-family:var(--font-display); font-size:20px; font-weight:700;
    display:inline-block; width:28px; height:28px; line-height:28px;
    border-radius:50%; background:var(--jade-deep); color:var(--ivory); margin-bottom:4px;
  }
  .seat-name{font-weight:700; font-size:14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
  .seat-total{font-family:var(--font-mono); font-size:16px; font-weight:700;}

  /* Recording */
  .choice-group
