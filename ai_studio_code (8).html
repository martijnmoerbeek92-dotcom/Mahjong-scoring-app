<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Spreadsheet: The App — Mahjong</title>

<!-- PWA / Native App Meta Tags -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mahjong">
<meta name="theme-color" content="#0d3b2e">
<link rel="manifest" href="data:application/manifest+json;charset=utf-8,%7B%22name%22%3A%20%22Mahjong%20Scorekeeper%22%2C%20%22short_name%22%3A%20%22Mahjong%22%2C%20%22display%22%3A%20%22standalone%22%2C%20%22background_color%22%3A%20%22%230d3b2e%22%2C%20%22theme_color%22%3A%20%22%23c79a2e%22%7D">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --jade-deep: #0d3b2e;
    --jade: #12503d;
    --jade-light: #1c6b52;
    --ivory: #f2ead7;
    --ivory-dim: #e4d9bd;
    --ink: #211c14;
    --gold: #c79a2e;
    --gold-bright: #e0b23f;
    --red: #a33b32;
    --red-bright: #c24d40;
    --font-display: 'Zilla Slab', serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:var(--font-body);
    background:
      radial-gradient(circle at 50% 0%, var(--jade-light) 0%, var(--jade) 45%, var(--jade-deep) 100%);
    color:var(--ivory);
    min-height:100vh;
    padding:32px 16px 64px;
    overscroll-behavior-y: none; /* Prevent pull-to-refresh on mobile */
  }
  .wrap{max-width:920px;margin:0 auto;}
  h1{
    font-family:var(--font-display);
    font-weight:700;
    font-size:clamp(28px,5vw,42px);
    text-align:center;
    letter-spacing:0.5px;
    margin:0 0 4px;
    color:var(--ivory);
  }
  .subtitle{
    text-align:center;
    color:var(--ivory-dim);
    font-size:14px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    margin-bottom:36px;
  }
  .card{
    background:linear-gradient(180deg, rgba(242,234,215,0.06), rgba(242,234,215,0.02));
    border:1px solid rgba(242,234,215,0.14);
    border-radius:14px;
    padding:24px;
    backdrop-filter:blur(2px);
  }
  /* ---------- Setup & Menu ---------- */
  #setup .field{margin-bottom:16px;}
  #setup label{
    display:block;
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:1px;
    color:var(--gold-bright);
    margin-bottom:6px;
    font-weight:600;
  }
  input[type=text], input[type=number]{
    width:100%;
    padding:10px 12px;
    border-radius:8px;
    border:1px solid rgba(242,234,215,0.25);
    background:rgba(0,0,0,0.18);
    color:var(--ivory);
    font-family:var(--font-body);
    font-size:16px; /* 16px prevents auto-zoom on iOS */
  }
  input::placeholder{color:rgba(242,234,215,0.35);}
  input:focus{outline:2px solid var(--gold-bright);outline-offset:1px;}
  
  .saved-game-card{
    background:rgba(0,0,0,0.15);
    border:1px solid rgba(242,234,215,0.15);
    border-radius:10px;
    padding:16px;
    margin-bottom:12px;
  }

  .btn{
    appearance:none;
    border:none;
    cursor:pointer;
    font-family:var(--font-body);
    font-weight:600;
    font-size:14px;
    padding:11px 20px;
    border-radius:8px;
    background:var(--gold);
    color:var(--ink);
    transition:transform .12s ease, background .12s ease;
  }
  .btn:hover{background:var(--gold-bright); transform:translateY(-1px);}
  .btn:active{transform:translateY(0);}
  .btn.secondary{
    background:transparent;
    color:var(--ivory);
    border:1px solid rgba(242,234,215,0.35);
  }
  .btn.secondary:hover{background:rgba(242,234,215,0.08);}
  .btn.danger{background:var(--red);color:var(--ivory);}
  .btn.danger:hover{background:var(--red-bright);}
  .btn:disabled{opacity:0.35;cursor:not-allowed;transform:none;}
  .row{display:flex;gap:12px;flex-wrap:wrap;}

  /* ---------- Compass ---------- */
  #game{display:none;}
  .compass{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    grid-template-rows:auto auto auto;
    gap:14px;
    align-items:center;
    justify-items:center;
    margin-bottom:28px;
  }
  .seat-slot{width:100%;}
  .seat-slot.north{grid-column:2;grid-row:1;}
  .seat-slot.west{grid-column:1;grid-row:2;}
  .seat-slot.center{grid-column:2;grid-row:2;}
  .seat-slot.east{grid-column:3;grid-row:2;}
  .seat-slot.south{grid-column:2;grid-row:3;}

  .seat-card{
    background:var(--ivory);
    color:var(--ink);
    border-radius:10px;
    padding:14px 10px;
    text-align:center;
    box-shadow:0 4px 10px rgba(0,0,0,0.25), inset 0 0 0 1px rgba(0,0,0,0.06);
    position:relative;
    transition:box-shadow .2s ease;
  }
  .seat-card.prevailing{
    box-shadow:0 0 0 2px var(--gold-bright), 0 6px 16px rgba(199,154,46,0.45);
  }
  .seat-wind-tag{
    font-family:var(--font-display);
    font-size:22px;
    font-weight:700;
    display:inline-block;
    width:32px;height:32px;line-height:32px;
    border-radius:50%;
    background:var(--jade-deep);
    color:var(--ivory);
    margin-bottom:6px;
  }
  .seat-card.prevailing .seat-wind-tag{background:var(--gold); color:var(--ink);}
  .seat-wind-word{
    display:block;
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:1px;
    font-weight:700;
    color:#6b6252;
    margin-bottom:4px;
  }
  .seat-name{font-weight:700;font-size:15px;margin-bottom:2px;}
  .seat-total{
    font-family:var(--font-mono);
    font-size:18px;
    font-weight:600;
  }
  .seat-total.pos{color:#1c6b3f;}
  .seat-total.neg{color:var(--red);}
  .seat-total.zero{color:#6b6252;}
  .seat-east-badge{
    position:absolute;
    top:-8px;right:-8px;
    background:var(--red);
    color:var(--ivory);
    font-size:10px;
    font-weight:700;
    letter-spacing:0.5px;
    padding:3px 6px;
    border-radius:6px;
    text-transform:uppercase;
  }
  .prevailing-badge{
    position:absolute;
    top:-8px;left:-8px;
    background:var(--gold);
    color:var(--ink);
    font-size:10px;
    font-weight:700;
    letter-spacing:0.5px;
    padding:3px 6px;
    border-radius:6px;
    text-transform:uppercase;
  }

  .hand-counter{
    text-align:center;
    font-size:14px;
    font-weight:600;
    color:var(--gold-bright);
    letter-spacing:0.5px;
    margin-bottom:24px;
  }

  /* ---------- Hand entry ---------- */
  .section-title{
    font-family:var(--font-display);
    font-size:20px;
    font-weight:600;
    margin:0 0 16px;
    color:var(--gold-bright);
  }
  .choice-group{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;}
  .choice-btn{
    padding:9px 16px;
    border-radius:20px;
    border:1px solid rgba(242,234,215,0.3);
    background:transparent;
    color:var(--ivory);
    font-family:var(--font-body);
    font-size:14px;
    cursor:pointer;
    transition:all .15s ease;
  }
  .choice-btn:hover{background:rgba(242,234,215,0.1);}
  .choice-btn.selected{
    background:var(--gold);
    border-color:var(--gold);
    color:var(--ink);
    font-weight:600;
  }
  .choice-btn:disabled{opacity:0.3;cursor:not-allowed;}
  .score-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:14px;
    margin-bottom:20px;
  }
  .score-field label{
    display:block;font-size:12px;color:var(--ivory-dim);margin-bottom:5px;
    text-transform:uppercase;letter-spacing:0.5px;
  }
  .hint{font-size:12px;color:var(--ivory-dim);margin:-8px 0 16px;line-height:1.5;}
  .divider{height:1px;background:rgba(242,234,215,0.15);margin:28px 0;}

  /* ---------- History ---------- */
  .hand-log{max-height:360px;overflow-y:auto;padding-right:4px;}
  .hand-entry{
    background:rgba(0,0,0,0.15);
    border-radius:10px;
    padding:14px 16px;
    margin-bottom:10px;
    font-size:13px;
  }
  .hand-entry .head{
    display:flex;justify-content:space-between;align-items:baseline;
    margin-bottom:8px;
    font-weight:600;
  }
  .hand-entry .head .num{color:var(--gold-bright);font-family:var(--font-mono);}
  .hand-entry .deltas{display:flex;flex-wrap:wrap;gap:10px;font-family:var(--font-mono);}
  .hand-entry .deltas span.pos{color:#7fdba0;}
  .hand-entry .deltas span.neg{color:#e08a80;}
  .hand-entry .meta{color:var(--ivory-dim);font-size:12px;margin-top:6px;}
  .entry-actions{display:flex;gap:8px;margin-top:10px;}
  .btn.small{padding:5px 12px;font-size:12px;}
  .empty-log{color:var(--ivory-dim);font-size:13px;text-align:center;padding:20px 0;}

  .top-actions{display:flex;justify-content:flex-end;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
  .form-error{
    background:rgba(163,59,50,0.25);
    border:1px solid rgba(163,59,50,0.5);
    color:var(--ivory);
    font-size:13px;
    padding:10px 14px;
    border-radius:8px;
    margin-bottom:16px;
  }

  /* ---------- Score calculator ---------- */
  select{
    padding:8px 10px;
    border-radius:8px;
    border:1px solid rgba(242,234,215,0.25);
    background:rgba(0,0,0,0.18);
    color:var(--ivory);
    font-family:var(--font-body);
    font-size:16px; 
  }
  select:focus{outline:2px solid var(--gold-bright);outline-offset:1px;}
  .calc-panel{
    margin-top:14px;
    padding:16px;
    border-radius:10px;
    background:rgba(0,0,0,0.2);
    border:1px solid rgba(242,234,215,0.15);
  }
  .calc-panel h4{
    font-family:var(--font-display);
    font-size:15px;
    margin:0 0 10px;
    color:var(--gold-bright);
  }
  .calc-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:10px;}
  .calc-row .calc-label{
    font-size:12px;color:var(--ivory-dim);min-width:64px;
  }
  .calc-set-block{
    padding:10px;border-radius:8px;background:rgba(242,234,215,0.05);margin-bottom:10px;
  }
  .calc-check-row{display:flex;flex-wrap:wrap;gap:16px;margin-bottom:12px;}
  .calc-check-row label{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--ivory-dim);cursor:pointer;}
  .calc-breakdown{
    margin-top:12px;padding:12px;border-radius:8px;
    background:rgba(199,154,46,0.1);border:1px solid rgba(199,154,46,0.3);
    font-size:13px;
  }
  .calc-breakdown ul{margin:6px 0;padding-left:20px;}
  .calc-breakdown .final{
    font-family:var(--font-mono);font-size:20px;font-weight:700;color:var(--gold-bright);margin-top:8px;
  }
  .calc-warning{color:#e08a80;font-size:12px;margin-top:6px;}
</style>
</head>
<body>
<div class="wrap">
  <h1>Spreadsheet: The App</h1>
  <div class="subtitle">Mahjong scorekeeper</div>

  <!-- MENU / SETUP -->
  <div id="setup" class="card">
    <div class="section-title">Start a new game</div>
    <div class="hint">Enter names in seating order. Seat 1 deals first (East); seats rotate counter-clockwise from there.</div>
    <div class="field"><label>Seat 1 — starts East</label><input type="text" id="name0" placeholder="Player name"></div>
    <div class="field"><label>Seat 2 — starts South</label><input type="text" id="name1" placeholder="Player name"></div>
    <div class="field"><label>Seat 3 — starts West</label><input type="text" id="name2" placeholder="Player name"></div>
    <div class="field"><label>Seat 4 — starts North</label><input type="text" id="name3" placeholder="Player name"></div>
    <button class="btn" onclick="startNewGame()">Start new game</button>

    <div id="savedGamesSection" style="display:none; margin-top:36px;">
      <div class="divider" style="margin:20px 0;"></div>
      <div class="section-title">Resume saved game</div>
      <div id="savedGamesList"></div>
    </div>
  </div>

  <!-- GAME -->
  <div id="game">
    <div class="top-actions">
      <button class="btn secondary" onclick="shareScores()">📤 Share scores</button>
      <button class="btn secondary" id="undoBtn" onclick="undoLast()" disabled>Undo last hand</button>
      <button class="btn secondary" onclick="exitToMenu()">Main Menu</button>
    </div>

    <div class="compass" id="compass"></div>
    <div class="hand-counter" id="handCounter"></div>

    <div class="card">
      <div class="section-title">Record a hand</div>

      <label style="display:block;font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--gold-bright);margin-bottom:8px;font-weight:600;">Outcome</label>
      <div class="choice-group" id="outcomeChoices"></div>

      <div id="winDetails">
        <label style="display:block;font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--gold-bright);margin-bottom:8px;font-weight:600;">Winner</label>
        <div class="choice-group" id="winnerChoices"></div>

        <label style="display:block;font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--gold-bright);margin-bottom:8px;font-weight:600;">Who discarded the winning tile?</label>
        <div class="choice-group" id="discarderChoices"></div>
        <div cla
